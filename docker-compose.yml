services:
  rails:
    # Build customizado com assets recompilados
    image: meu-chatwoot-custom:v1.11
    container_name: chatwoot-rails
    ports:
      - "3000:3000"
    volumes:
      - storage:/app/storage
    depends_on:
      - postgres
      - redis
    environment:
      # Rails & Node
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - DEFAULT_LOCALE=pt_BR
      
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - INTERNAL_HOST_URL=http://rails:3000
      
      # Database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-chatwoot_production}
      
      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # Security
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-replace_with_secret_key}
      
      # Customização do Frontend/Branding (IMPORTANTE!)
      - BRAND_ASSETS_URL=${BRAND_ASSETS_URL:-}
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL:-noreply@chatwoot.com}
      
      # Email (opcional - Resend)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      
      # WhatsApp (Baileys) - opcional
      - BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME=${BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME:-Chatwoot}
      - BAILEYS_PROVIDER_DEFAULT_URL=http://baileys-api:3025
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY:-default-api-key}
      - BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL=true
    
    entrypoint: docker/entrypoints/rails.sh
    command:
      - bundle
      - exec
      - rails
      - s
      - '-p'
      - '3000'
      - '-b'
      - 0.0.0.0
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Accept: text/html' http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 20s
      retries: 10

  sidekiq:
    image: meu-chatwoot-custom:v1.11
    container_name: chatwoot-sidekiq
    volumes:
      - storage:/app/storage
    depends_on:
      - postgres
      - redis
      - rails
    environment:
      # Rails & Node
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - DEFAULT_LOCALE=pt_BR
      
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - INTERNAL_HOST_URL=http://rails:3000
      
      # Database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-chatwoot_production}
      
      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # Security
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-replace_with_secret_key}
      
      # Email
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL:-noreply@chatwoot.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      
      # WhatsApp
      - BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME=${BAILEYS_PROVIDER_DEFAULT_CLIENT_NAME:-Chatwoot}
      - BAILEYS_PROVIDER_DEFAULT_URL=http://baileys-api:3025
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY:-default-api-key}
      - BAILEYS_PROVIDER_USE_INTERNAL_HOST_URL=true
    
    command:
      - bundle
      - exec
      - sidekiq
      - '-C'
      - config/sidekiq.yml
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep [s]idekiq"]
      interval: 20s
      timeout: 20s
      retries: 10

  postgres:
    image: ghcr.io/fazer-ai/postgres-16-pgvector:latest
    container_name: chatwoot-postgres
    restart: unless-stopped
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE:-chatwoot_production}
      - POSTGRES_USER=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 20s
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: chatwoot-redis
    restart: unless-stopped
    command:
      - sh
      - '-c'
      - 'redis-server --requirepass "${REDIS_PASSWORD:-}" --appendonly yes'
    volumes:
      - redis:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 20s
      timeout: 20s
      retries: 10

  kanban-backend:
    image: astraonline/kanbanback:develop
    container_name: kanban-backend
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Banco próprio do Kanban (schema isolado no mesmo Postgres)
      - DATABASE_URL=postgresql://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DATABASE:-chatwoot_production}?schema=kanbancw
      # Banco do Chatwoot — para injetar o Dashboard Script
      - CHATWOOT_DATABASE_URL=postgresql://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DATABASE:-chatwoot_production}
      # URL pública local do FRONTEND do kanban (é o que vai no iframe do Chatwoot)
      - KANBANCW_DOMAIN=http://localhost:3002
      - CHATWOOT_DOMAIN=${FRONTEND_URL:-http://localhost:3000}
      # URL INTERNA do Chatwoot (via rede Docker) — evita chamar localhost dentro do container
      - CHATWOOT_API_URL=http://rails:3000
      - CORS_ORIGIN=http://localhost:3002,${FRONTEND_URL:-http://localhost:3000}
      # Redis compartilhado
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  kanban-frontend:
    image: astraonline/kanbanfront:develop
    container_name: kanban-frontend
    ports:
      - "3002:80"
    depends_on:
      - kanban-backend
    environment:
      # URL pública local do BACKEND do kanban
      - VITE_API_URL=http://localhost:3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 10

  baileys-api:
    image: ghcr.io/fazer-ai/baileys-api:latest
    container_name: chatwoot-baileys
    restart: unless-stopped
    volumes:
      - storage:/app/storage
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - BAILEYS_LOG_LEVEL=${BAILEYS_LOG_LEVEL:-error}
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=${BAILEYS_API_KEY:-default-api-key}
    command:
      - sh
      - '-c'
      - 'bun manage-api-keys create user ${BAILEYS_API_KEY:-default-api-key} && bun start'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3025/status"]
      interval: 20s
      timeout: 20s
      retries: 10

volumes:
  storage:
  postgres:
  redis:
